---
# Helper task file to convert a single directory to a BTRFS subvolume.
# Expects:
# - btrfs_root_mount (e.g. /mnt/btrfs-root)
# - btrfs_uuid
# - subvol:
#     name: "@var_lib_docker"
#     mountpoint: "/var/lib/docker"
#     stop_services: ["docker", "containerd"]

- name: Check if mountpoint {{ subvol.mountpoint }} is already a BTRFS subvolume mount
  ansible.builtin.command: findmnt -no FSTYPE,OPTIONS {{ subvol.mountpoint }}
  register: subvol_mount
  changed_when: false
  failed_when: false

- name: Set already-mounted-as-subvolume fact
  ansible.builtin.set_fact:
    already_subvol_mount: >-
      {{
        (subvol_mount.rc == 0)
        and (subvol_mount.stdout.split()[0] == 'btrfs')
        and ('subvol=' in (subvol_mount.stdout.split()[1] | default('')))
      }}

- name: Skip conversion for {{ subvol.mountpoint }} (already a subvolume mount)
  ansible.builtin.debug:
    msg: "Skipping {{ subvol.mountpoint }}: already mounted as a BTRFS subvolume."
  when: already_subvol_mount

- name: Ensure subvolume {{ subvol.name }} exists under BTRFS root
  ansible.builtin.command: btrfs subvolume list -o {{ btrfs_root_mount }}
  register: existing_subvols
  changed_when: false

- name: Create subvolume {{ subvol.name }} if missing
  ansible.builtin.command: btrfs subvolume create {{ btrfs_root_mount }}/{{ subvol.name }}
  when:
    - not already_subvol_mount
    - "'{{ subvol.name }}' not in existing_subvols.stdout"

- name: Stop services using {{ subvol.mountpoint }}
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop: "{{ subvol.stop_services }}"
  when:
    - not already_subvol_mount
    - subvol.stop_services | length > 0

- name: Ensure mountpoint directory {{ subvol.mountpoint }} exists
  ansible.builtin.file:
    path: "{{ subvol.mountpoint }}"
    state: directory
    mode: "0755"
  when: not already_subvol_mount

- name: Check for conversion marker in subvolume {{ subvol.name }}
  ansible.builtin.stat:
    path: "{{ btrfs_root_mount }}/{{ subvol.name }}/.kaiju_subvol_converted"
  register: conversion_marker
  when: not already_subvol_mount

- name: Rsync data into subvolume {{ subvol.name }} (first run, destructive mirror)
  ansible.builtin.command: >
    rsync -aAX --delete {{ subvol.mountpoint }}/ {{ btrfs_root_mount }}/{{ subvol.name }}/
  changed_when: true
  when:
    - not already_subvol_mount
    - not conversion_marker.stat.exists

- name: Rsync data into subvolume {{ subvol.name }} (subsequent run, no delete)
  ansible.builtin.command: >
    rsync -aAX {{ subvol.mountpoint }}/ {{ btrfs_root_mount }}/{{ subvol.name }}/
  changed_when: true
  when:
    - not already_subvol_mount
    - conversion_marker.stat.exists

- name: Create conversion marker in subvolume {{ subvol.name }}
  ansible.builtin.file:
    path: "{{ btrfs_root_mount }}/{{ subvol.name }}/.kaiju_subvol_converted"
    state: touch
    mode: "0644"
  when:
    - not already_subvol_mount
    - not conversion_marker.stat.exists

- name: Mount subvolume {{ subvol.name }} at {{ subvol.mountpoint }} and persist in fstab
  ansible.builtin.mount:
    path: "{{ subvol.mountpoint }}"
    src: "UUID={{ btrfs_uuid }}"
    fstype: btrfs
    opts: "subvol={{ subvol.name }},defaults"
    state: mounted
    fstab: yes
  when: not already_subvol_mount

- name: Start services using {{ subvol.mountpoint }}
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
  loop: "{{ subvol.stop_services }}"
  when:
    - not already_subvol_mount
    - subvol.stop_services | length > 0

