---
# Validate Cloudflare DNS records for this project (hell.sk zone).
# Run from ansible/: ansible-playbook -i inventory/hosts.yml playbooks/dns-validate.yml
# (Use -i so inventory + group_vars/all.yml load; otherwise Cloudflare vars may be missing/wrong.)
#
# Validates:
# - Core A records (kaiju/mail/webmail/autoconfig/autodiscover/metrics/logs) — always checked against group_vars
# - static_web_vhosts under the primary zone — only FQDNs not listed in dns_production_static_fqdns (see below)
# - Mail essentials (MX, SPF, DMARC; DKIM optional if provided)
#
# Fails if records are missing or drifted.
#
# *** PRODUCTION SAFETY GUARD (mail records) ***
# During lab, MX/SPF/DMARC still point to abyss.hell.sk and WILL differ from group_vars values.
# By default, mail record validation is SKIPPED (validate_mail_dns: false).
# Only enable after mail-dns-records.yml has been run for the production cutover:
#   ansible-playbook playbooks/dns-validate.yml -e validate_mail_dns=true
#
# *** PRODUCTION SAFETY GUARD (static sites on primary zone) ***
# FQDNs in dns_production_static_fqdns (default: apex, www, from under domain + listed extra zones) are NOT
# validated as A → web_ip unless dns_production_static_allow_changes=true (group_vars or -e).
# Core lab hostnames (kaiju/mail/metrics/logs/…) are always validated.

- name: Validate Cloudflare DNS records
  hosts: localhost
  gather_facts: false

  vars:
    cf_api_base: "https://api.cloudflare.com/client/v4"
    cf_zone_name: "{{ cloudflare_zone_name | default(domain) }}"

    expected_web_ip: "{{ web_ip }}"
    expected_mail_ip: "{{ mail_ip }}"

    expected_kaiju_fqdn: "{{ kaiju_fqdn | default('kaiju.' + domain) }}"
    expected_mail_fqdn: "{{ mailcow_fqdn | default('mail.' + domain) }}"
    expected_webmail_fqdn: "{{ mailcow_webmail_fqdn | default('webmail.' + domain) }}"
    expected_metrics_fqdn: "{{ grafana_fqdn | default('metrics.' + domain) }}"
    expected_logs_fqdn: "{{ dozzle_fqdn | default('logs.' + domain) }}"

    # Orange cloud for Traefik-facing A records (kaiju, metrics, logs, static_web_vhosts). Set cf_web_a_proxied in group_vars; false = DNS-only.
    # Use _effective name here — play var must not shadow group_vars or Ansible hits recursive template resolution.
    cf_web_a_proxied_effective: "{{ cf_web_a_proxied | default(true) | bool }}"

    dns_production_static_allow_changes_effective: "{{ dns_production_static_allow_changes | default(false) | bool }}"
    dns_production_static_fqdns_effective: "{{ dns_production_static_fqdns | default([domain, 'www.' ~ domain, 'from.' ~ domain, 'goldendawns-clan.cz', 'www.goldendawns-clan.cz']) }}"

    expected_mx_name: "{{ domain }}"
    expected_mx_target: "{{ expected_mail_fqdn }}"
    expected_mx_priority: "{{ mail_mx_priority | default(10) | int }}"

    expected_spf_value: "{{ mail_spf_value | default('v=spf1 mx -all') }}"
    expected_dmarc_name: "_dmarc.{{ domain }}"
    expected_dmarc_policy: "{{ dmarc_policy | default('none') }}"
    expected_dmarc_rua: "{{ dmarc_rua | default('mailto:postmaster@' + domain) }}"
    expected_dmarc_ruf: "{{ dmarc_ruf | default('mailto:postmaster@' + domain) }}"
    expected_dmarc_value: >-
      {{ 'v=DMARC1; p=' + expected_dmarc_policy + '; rua=' + expected_dmarc_rua + '; ruf=' + expected_dmarc_ruf + '; adkim=s; aspf=s; fo=1' }}

  tasks:
    - name: Fail if no Cloudflare DNS API token is configured
      ansible.builtin.fail:
        msg: >-
          Set cloudflare_dns_api_token (scoped API Token) in group_vars/all.yml, or set
          cloudflare_api_token alone for legacy single-token use. See docs/TODO-deploy.md (Cloudflare tokens).
      when: >
        (cloudflare_dns_api_token | default('') | trim | length == 0)
        and (cloudflare_api_token | default('') | trim | length == 0)

    - name: Prepare Cloudflare DNS API token (Bearer)
      ansible.builtin.import_tasks: tasks/cloudflare-api-token.yml

    - name: Fail if web_ip or mail_ip is not set
      ansible.builtin.fail:
        msg: "web_ip and mail_ip must be set in group_vars/all.yml"
      when: web_ip is not defined or mail_ip is not defined

    - name: Get Cloudflare zone id for {{ cf_zone_name }}
      ansible.builtin.uri:
        url: "{{ cf_api_base }}/zones?name={{ cf_zone_name }}"
        method: GET
        headers: "{{ cf_cloudflare_request_headers }}"
        return_content: true
      register: cf_zone_resp

    - name: Set Cloudflare zone id
      ansible.builtin.set_fact:
        cf_zone_id: "{{ (cf_zone_resp.json.result | first).id }}"
      failed_when: cf_zone_resp.json.result | length != 1

    - name: Filter static web FQDNs (production-static safeguard)
      ansible.builtin.import_tasks: tasks/dns-static-web-fqdns-for-zone.yml

    # Avoid regex_replace + from_json (backrefs in Jinja often produce invalid JSON).
    - name: Initialize static web A record expectations
      ansible.builtin.set_fact:
        dns_validate_static_a_records: []

    - name: Build static web A record expectations (FQDNs under primary domain, minus production-static list)
      ansible.builtin.set_fact:
        dns_validate_static_a_records: "{{ dns_validate_static_a_records + [{'type': 'A', 'name': item, 'content': expected_web_ip, 'proxied': cf_web_a_proxied_effective}] }}"
      loop: "{{ dns_static_web_fqdns_for_zone }}"
      loop_control:
        label: "{{ item }}"

    - name: Build expected A records list
      ansible.builtin.set_fact:
        expected_a_records: "{{ dns_validate_core_a_records + (dns_validate_static_a_records | default([])) }}"
      vars:
        dns_validate_core_a_records: >-
          {{
            [
              {'type': 'A', 'name': expected_kaiju_fqdn, 'content': expected_web_ip, 'proxied': cf_web_a_proxied_effective},
              {'type': 'A', 'name': expected_mail_fqdn, 'content': expected_mail_ip, 'proxied': false},
              {'type': 'A', 'name': 'autodiscover.' + domain, 'content': expected_mail_ip, 'proxied': false},
              {'type': 'A', 'name': 'autoconfig.' + domain, 'content': expected_mail_ip, 'proxied': false},
              {'type': 'A', 'name': expected_webmail_fqdn, 'content': expected_mail_ip, 'proxied': (cf_webmail_proxied | default(false) | bool)},
              {'type': 'A', 'name': expected_metrics_fqdn, 'content': expected_web_ip, 'proxied': cf_web_a_proxied_effective},
              {'type': 'A', 'name': expected_logs_fqdn, 'content': expected_web_ip, 'proxied': cf_web_a_proxied_effective},
            ]
          }}

    - name: Validate A records
      ansible.builtin.include_tasks: dns-validate_record.yml
      loop: "{{ expected_a_records }}"
      loop_control:
        loop_var: exp

    - name: Skipping mail DNS validation (validate_mail_dns not set)
      ansible.builtin.debug:
        msg: >
          Mail DNS validation (MX/SPF/DMARC/DKIM) is SKIPPED during lab.
          These records still point to abyss.hell.sk and will differ from group_vars.
          Re-run with -e validate_mail_dns=true after production cutover.
      when: not (validate_mail_dns | default(false) | bool)

    - name: Build expected mail DNS records list
      ansible.builtin.set_fact:
        expected_mail_records:
          - { type: "MX",  name: "{{ expected_mx_name }}",    content: "{{ expected_mx_target }}", priority: "{{ expected_mx_priority }}", proxied: false }
          - { type: "TXT", name: "{{ domain }}",              content: "{{ expected_spf_value }}", proxied: false }
          - { type: "TXT", name: "{{ expected_dmarc_name }}", content: "{{ expected_dmarc_value }}", proxied: false }
      when: validate_mail_dns | default(false) | bool

    - name: Optionally add DKIM record expectation when dkim_public_key is defined
      ansible.builtin.set_fact:
        expected_mail_records: >-
          {{
            expected_mail_records
            + [ { 'type':'TXT', 'name': (dkim_selector | default('dkim')) + '._domainkey.' + domain, 'content': dkim_public_key, 'proxied': false } ]
          }}
      when:
        - validate_mail_dns | default(false) | bool
        - dkim_public_key is defined and dkim_public_key | length > 0

    - name: Validate mail DNS records
      ansible.builtin.include_tasks: dns-validate_record.yml
      loop: "{{ expected_mail_records | default([]) }}"
      loop_control:
        loop_var: exp
      when: validate_mail_dns | default(false) | bool

    - name: DNS validation passed
      ansible.builtin.debug:
        msg: >
          Cloudflare DNS validation passed for zone {{ cf_zone_name }}.
          {{ '' if (validate_mail_dns | default(false) | bool) else '(mail DNS records skipped — not in cutover mode)' }}

