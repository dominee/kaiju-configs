---
# Preflight validation for kaiju stack.
# Run before any deploy playbook:
#   ansible-playbook -i ../inventory/hosts.yml playbooks/preflight.yml
#
# This playbook fails fast when required variables or on-host prerequisites are missing.
#
# The first play uses hosts: localhost — that always means “the Ansible controller” (the host
# where you run ansible-playbook), whether that is your laptop or a dedicated jump host.
# Declare localhost under `all` in inventory/hosts.yml (see hosts.yml.example) so it receives
# group_vars like any other inventory host.
#
# group_vars discovery: Ansible loads `group_vars/all.yml` from the directory that contains
# the inventory file (`inventory/group_vars/`). This repo keeps the real file at
# `ansible/group_vars/all.yml` and provides `inventory/group_vars/all.yml` as a symlink so
# variables load whether you run from `ansible/` or from the repository root with
# `-i ansible/inventory/hosts.yml`. Without that symlink, running from the repo root yields an
# almost empty variable set (only inventory host vars like ansible_connection).

- name: Preflight (controller-side variable checks)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Require domain convention
      ansible.builtin.assert:
        that:
          - domain is defined
          - domain | length > 0
          - (enforce_hell_sk_domain | default(true) | bool) | ternary(domain == "hell.sk", true)
        fail_msg: "domain must be set to hell.sk for this repository (or set enforce_hell_sk_domain: false explicitly)."

    - name: Require Cloudflare API token for ACME/DNS automation
      ansible.builtin.assert:
        that:
          - cloudflare_api_token is defined
          - cloudflare_api_token | length > 0
          - cloudflare_api_token != "your-cloudflare-api-token"
        fail_msg: "cloudflare_api_token must be set (real token) in group_vars/all.yml (use ansible-vault if preferred)."

    - name: Require web_ip and mail_ip for DNS split-host setup
      ansible.builtin.assert:
        that:
          - web_ip is defined
          - mail_ip is defined
          - web_ip | length > 0
          - mail_ip | length > 0
        fail_msg: "web_ip and mail_ip must be set in group_vars/all.yml."

    - name: Require key FQDN variables
      ansible.builtin.assert:
        that:
          - kaiju_fqdn is defined
          - mailcow_fqdn is defined
          - mailcow_webmail_fqdn is defined
        fail_msg: "kaiju_fqdn, mailcow_fqdn, and mailcow_webmail_fqdn must be set in group_vars/all.yml."

    - name: Require observability Basic Auth configuration when enabled
      ansible.builtin.assert:
        that:
          - (observability_basic_auth_users | default([])) | length > 0
        fail_msg: "observability_basic_auth_enabled is true but observability_basic_auth_users is empty. Set htpasswd entries in group_vars/all.yml (use ansible-vault)."
      when: observability_basic_auth_enabled | default(true) | bool

    - name: Require acme_email for Traefik ACME (mail certs)
      ansible.builtin.assert:
        that:
          - acme_email is defined
          - acme_email | length > 0
          - '"@" in acme_email'
        fail_msg: "acme_email must be set (e.g. admin@hell.sk) in group_vars/all.yml."

    - name: Require Grafana admin password
      ansible.builtin.assert:
        that:
          - grafana_admin_password is defined
          - grafana_admin_password | length > 0
        fail_msg: "grafana_admin_password must be set in group_vars/all.yml (use ansible-vault)."

    - name: Require observability_basic_auth_users to be a list (not _0 suffix vars)
      ansible.builtin.assert:
        that:
          - observability_basic_auth_users is iterable
          - observability_basic_auth_users is not string
        fail_msg: >
          observability_basic_auth_users must be a YAML list in group_vars/all.yml.
          Do NOT use observability_basic_auth_users_0 — structure it as:
            observability_basic_auth_users:
              - !vault |
                  $ANSIBLE_VAULT;...
      when: observability_basic_auth_enabled | default(true) | bool

    - name: Warn about non-domain FQDNs in static_web_vhosts needing separate origin certs
      ansible.builtin.debug:
        msg: >
          WARNING: static_web_vhosts contains FQDN '{{ item.fqdn }}' which is outside
          the '{{ domain }}' zone. A single Cloudflare Origin Cert for '{{ domain }}'
          will NOT cover it. Either: add a second origin cert pair to 'origin_cert_pairs'
          in group_vars/all.yml, or rely on ACME (set cloudflare_origin_cert_enabled: false
          for that zone). This is not enforced but will cause TLS errors if ignored.
      when:
        - cloudflare_origin_cert_enabled | default(false) | bool
        - not (item.fqdn | regex_search('(^|\\.)' + (domain | regex_escape) + '$'))
      loop: "{{ static_web_vhosts | default([]) }}"

- name: Preflight (host-side checks)
  hosts: kaiju
  become: true
  gather_facts: false
  vars:
    traefik_install_path: /opt/traefik
  tasks:
    - name: Verify required commands exist (pre-Docker install check)
      ansible.builtin.shell: "which {{ item }}"
      loop:
        - findmnt
        - rsync
        - openssl
      register: cmd_check
      changed_when: false
      failed_when: false
      args:
        executable: /bin/bash

    - name: Fail if a required command is missing
      ansible.builtin.fail:
        msg: "Missing required command: {{ item.item }} — install it before running playbooks."
      when: item.rc != 0
      loop: "{{ cmd_check.results }}"

    # origin_cert_pairs use container paths (/certs/...) in Traefik config; stat() needs host paths.
    - name: Check Cloudflare Origin cert files when enabled
      ansible.builtin.stat:
        path: >-
          {{
            (traefik_install_path ~ item.cert_file)
            if (item.cert_file is match('^/certs/'))
            else item.cert_file
          }}
      loop: "{{ origin_cert_pairs | default([{'cert_file': traefik_install_path + '/certs/origin.pem', 'key_file': traefik_install_path + '/certs/origin-key.pem'}]) }}"
      register: origin_cert_file_stats
      when: cloudflare_origin_cert_enabled | default(false) | bool

    - name: Check Cloudflare Origin key files when enabled
      ansible.builtin.stat:
        path: >-
          {{
            (traefik_install_path ~ item.key_file)
            if (item.key_file is match('^/certs/'))
            else item.key_file
          }}
      loop: "{{ origin_cert_pairs | default([{'cert_file': traefik_install_path + '/certs/origin.pem', 'key_file': traefik_install_path + '/certs/origin-key.pem'}]) }}"
      register: origin_key_file_stats
      when: cloudflare_origin_cert_enabled | default(false) | bool

    - name: Fail if any Origin cert file is missing
      ansible.builtin.fail:
        msg: >-
          cloudflare_origin_cert_enabled is true but cert file missing on host.
          Declared (Traefik): {{ item.item.cert_file }} — checked path: {{ item.invocation.module_args.path }}
      when:
        - cloudflare_origin_cert_enabled | default(false) | bool
        - item.stat is defined
        - not item.stat.exists
      loop: "{{ origin_cert_file_stats.results | default([]) }}"

    - name: Fail if any Origin key file is missing
      ansible.builtin.fail:
        msg: >-
          cloudflare_origin_cert_enabled is true but key file missing on host.
          Declared (Traefik): {{ item.item.key_file }} — checked path: {{ item.invocation.module_args.path }}
      when:
        - cloudflare_origin_cert_enabled | default(false) | bool
        - item.stat is defined
        - not item.stat.exists
      loop: "{{ origin_key_file_stats.results | default([]) }}"

    - name: Check mailcow install path exists (if mailcow_install_path set)
      ansible.builtin.stat:
        path: "{{ mailcow_install_path }}"
      register: mailcow_path_stat
      when: mailcow_install_path is defined

    - name: Fail if mailcow_install_path does not exist
      ansible.builtin.fail:
        msg: "mailcow_install_path does not exist on host: {{ mailcow_install_path }} (mount /vault first)."
      when:
        - mailcow_install_path is defined
        - not mailcow_path_stat.stat.exists

