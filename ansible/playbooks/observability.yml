---
# Observability stack: Prometheus, Grafana, node_exporter, cAdvisor, Dozzle, ctop, lnav.
# Run: ansible-playbook -i ../inventory/hosts.yml observability.yml
# Requires: group_vars/all.yml with dozzle_fqdn, grafana_fqdn, prometheus_* vars.
#
# Log review: lnav is installed on the *host* (not inside containers). It can open all Docker
# json-file logs via `lnav-docker-all` and pipe journalctl via `lnav-journal`.
# Rotation: journald caps in journald.conf.d; Docker json-file rotation via /etc/docker/daemon.json
# (max-size / max-file). Traditional syslog files under /var/log use Debian defaults unless overridden.

- name: Deploy observability stack on kaiju
  hosts: kaiju
  become: true
  vars:
    observability_install_path: /opt/observability
    ctop_version: "0.7.7"
  tasks:
    - name: Fail if Basic Auth is enabled but no users are configured
      ansible.builtin.fail:
        msg: "observability_basic_auth_enabled is true but observability_basic_auth_users is empty. Set it in group_vars/all.yml (use ansible-vault)."
      when:
        - observability_basic_auth_enabled | default(true) | bool
        - (observability_basic_auth_users | default([])) | length == 0

    - name: Fail if grafana_admin_password is not set
      ansible.builtin.fail:
        msg: "grafana_admin_password must be set in group_vars/all.yml (use ansible-vault)."
      when: grafana_admin_password is not defined or grafana_admin_password | length == 0

    - name: Check if ctop is installed
      ansible.builtin.command:
        argv: [ctop, -v]
      register: ctop_version_check
      changed_when: false
      failed_when: false

    - name: Install/upgrade ctop (container top) CLI from GitHub release
      ansible.builtin.get_url:
        url: "https://github.com/bcicen/ctop/releases/download/v{{ ctop_version }}/ctop-{{ ctop_version }}-linux-{{ ctop_arch }}"
        dest: /usr/local/bin/ctop
        mode: "0755"
        owner: root
        group: root
      vars:
        ctop_arch: >-
          {{
            'amd64' if ansible_facts.architecture in ['x86_64', 'amd64']
            else 'arm64' if ansible_facts.architecture in ['aarch64', 'arm64']
            else ansible_facts.architecture
          }}
      when: ctop_version_check.rc != 0 or (ctop_version_check.stdout | default('')) is not search('^ctop version ' ~ ctop_version ~ '$')

    # --- lnav (host CLI/TUI) + log retention (journald + Docker json-file) -----------------

    - name: Install lnav (log navigator — color, search, SQL filters; multi-file TUI)
      ansible.builtin.apt:
        name: lnav
        state: present

    - name: Deploy lnav helper scripts for Docker + journal
      ansible.builtin.template:
        src: "templates/{{ item.src }}"
        dest: "/usr/local/bin/{{ item.dest }}"
        mode: "0755"
        owner: root
        group: root
      loop:
        - { src: lnav-docker-all.sh.j2, dest: lnav-docker-all }
        - { src: lnav-journal.sh.j2, dest: lnav-journal }
      loop_control:
        label: "{{ item.dest }}"

    - name: Ensure systemd-journald configuration drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        mode: "0755"

    - name: Deploy journald storage caps (persisted + runtime journal)
      ansible.builtin.template:
        src: templates/journald-kaiju.conf.j2
        dest: /etc/systemd/journald.conf.d/99-kaiju-observability.conf
        mode: "0644"
      notify: Restart systemd-journald
      when: journald_caps_enabled | default(true) | bool

    - name: Check whether Docker Engine is installed
      ansible.builtin.stat:
        path: /usr/bin/docker
      register: docker_engine_bin

    - name: Deploy Docker daemon.json for json-file container log rotation
      ansible.builtin.template:
        src: templates/docker-daemon.json.j2
        dest: /etc/docker/daemon.json
        mode: "0644"
        backup: true
      when:
        - docker_engine_bin.stat.exists
        - docker_log_rotate_enabled | default(true) | bool
      notify: Restart Docker

    - name: Flush journald/Docker handlers before observability compose (apply daemon.json + journal caps)
      ansible.builtin.meta: flush_handlers

    - name: Create observability install directory
      ansible.builtin.file:
        path: "{{ observability_install_path }}"
        state: directory
        mode: "0755"

    - name: Deploy Prometheus config
      ansible.builtin.template:
        src: templates/prometheus.yml.j2
        dest: "{{ observability_install_path }}/prometheus.yml"
        mode: "0644"

    - name: Deploy observability compose file
      ansible.builtin.template:
        src: templates/observability-compose.yml.j2
        dest: "{{ observability_install_path }}/docker-compose.yml"
        mode: "0644"

    - name: Start observability stack
      ansible.builtin.shell: |
        cd {{ observability_install_path }} && docker compose up -d
      register: observability_up
      changed_when: "'Creating' in observability_up.stdout or 'Starting' in observability_up.stdout or 'Pulling' in observability_up.stdout"
      args:
        executable: /bin/bash

    - name: Show observability compose status (post-deploy)
      ansible.builtin.command:
        argv: [docker, compose, ps]
      args:
        chdir: "{{ observability_install_path }}"
      register: observability_compose_ps
      changed_when: false

    - name: Assert Grafana and Dozzle containers are running
      ansible.builtin.assert:
        that:
          - (observability_compose_ps.stdout | default('')) is search('grafana')
          - (observability_compose_ps.stdout | default('')) is search('dozzle')
          - (observability_compose_ps.stdout | default('')) is search('Up')
        fail_msg: >-
          Observability stack started, but containers do not look healthy/running.
          Output:
          {{ observability_compose_ps.stdout | default('') }}

    - name: Query Traefik routers via local API (runs on kaiju)
      ansible.builtin.command:
        argv:
          - curl
          - -fsS
          - http://127.0.0.1:8080/api/http/routers
      register: traefik_routers_json
      changed_when: false
      failed_when: false

    - name: Assert Traefik has routers for Grafana and Dozzle
      ansible.builtin.assert:
        that:
          - traefik_routers_json.rc == 0
          - (traefik_routers_json.stdout | default('')) is search('grafana@docker')
          - (traefik_routers_json.stdout | default('')) is search('dozzle@docker')
        fail_msg: >-
          Traefik does not list expected routers for Grafana/Dozzle.
          curl exit code: {{ traefik_routers_json.rc | default('n/a') }}
          This typically means the API is not reachable (--api.insecure=true missing),
          containers are not on the proxy network, or traefik.enable=true label is absent.
          Routers JSON (truncated):
          {{ (traefik_routers_json.stdout | default('') )[:3000] }}

  handlers:
    - name: Restart systemd-journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted

    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

