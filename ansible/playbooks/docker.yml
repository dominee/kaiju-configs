---
# Install Docker and Traefik on kaiju.
# Run: ansible-playbook -i ../inventory/hosts.yml docker.yml
# Requires: group_vars/all.yml with domain, acme_email, cloudflare_api_token.
- name: Install Docker and deploy Traefik
  hosts: kaiju
  become: true
  vars:
    docker_apt_release: "{{ ansible_facts['distribution_release'] }}"
    docker_install_prefer_ce_effective: "{{ docker_install_prefer_ce | default(true) | bool }}"
    traefik_install_path: /opt/traefik
    static_web_install_path: /opt/static-web
  tasks:
    - name: Remove conflicting packages (only when installing Docker CE)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-doc
          - docker-compose
          - podman-docker
          - containerd
          - runc
        state: absent
      failed_when: false
      when: docker_install_prefer_ce_effective | bool

    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key (Docker CE)
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true
      when: docker_install_prefer_ce_effective | bool

    - name: Add Docker apt repository (Docker CE)
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_facts['architecture'] }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ docker_apt_release }} stable"
        filename: docker
        state: present
        update_cache: true
      when: docker_install_prefer_ce_effective | bool

    # apt-cache show docker-ce can succeed even when no build exists for this Debian
    # release/arch; apt-get -s install is a reliable installability check.
    - name: Simulate Docker CE install (check packages are resolvable)
      ansible.builtin.command:
        argv:
          - apt-get
          - install
          - -s
          - -y
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
      environment:
        DEBIAN_FRONTEND: noninteractive
      register: docker_ce_simulate
      changed_when: false
      failed_when: false
      when: docker_install_prefer_ce_effective | bool

    - name: Decide Docker install method
      ansible.builtin.set_fact:
        # When prefer_ce is false, Jinja short-circuits and does not read docker_ce_simulate.
        docker_use_ce: >-
          {{
            (docker_install_prefer_ce_effective | bool)
            and ((docker_ce_simulate.rc | default(-1)) == 0)
          }}

    - name: Install Docker (Docker CE)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      when: docker_use_ce | bool

    - name: Install Docker (Debian packages fallback)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
        state: present
        update_cache: true
      when: not (docker_use_ce | default(false) | bool)

    - name: Install docker compose plugin (Debian fallback, optional)
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present
      when: not (docker_use_ce | default(false) | bool)
      failed_when: false

    - name: Add deploy user to docker group
      ansible.builtin.user:
        name: "{{ docker_deploy_user | default(ansible_user) }}"
        groups: docker
        append: true

    - name: Enable Docker and containerd on boot
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - docker
        - containerd

    # docker0 is created when Docker starts; nftables cannot reference it before that (harden.yml
    # deploys a rule set without Docker forward rules until docker0 exists).
    - name: Wait for docker0 bridge (created by Docker)
      ansible.builtin.wait_for:
        path: /sys/class/net/docker0
        state: present
        timeout: 120

    - name: Redeploy nftables with Docker bridge forward rules
      ansible.builtin.template:
        src: templates/nftables.conf.j2
        dest: /etc/nftables.conf
        mode: "0644"
      vars:
        nftables_enable_docker_forward: true

    - name: Reload nftables after Docker bridge rules
      ansible.builtin.systemd:
        name: nftables
        state: reloaded

    # nftables.conf uses `flush ruleset`, which wipes Docker’s iptables/nft chains.
    # Restart Docker to recreate the DOCKER/DOCKER-USER chains before creating networks/containers.
    - name: Restart Docker after nftables reload (recreate iptables/nft chains)
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Restart static-web and traefik after firewall change
      ansible.builtin.shell: |
        docker restart static-web traefik
      register: docker_restart_out
      changed_when: docker_restart_out.rc == 0
      failed_when: false
      args:
        executable: /bin/bash

    - name: Create Traefik install directory
      ansible.builtin.file:
        path: "{{ traefik_install_path }}"
        state: directory
        mode: "0755"

    - name: Create Traefik certs directory (Cloudflare Origin Cert)
      ansible.builtin.file:
        path: "{{ traefik_install_path }}/certs"
        state: directory
        mode: "0755"
      when: cloudflare_origin_cert_enabled | default(false) | bool

    - name: Deploy Traefik origin certs config
      ansible.builtin.template:
        src: templates/traefik-origin-certs.yml.j2
        dest: "{{ traefik_install_path }}/origin-certs.yml"
        mode: "0644"
      when: cloudflare_origin_cert_enabled | default(false) | bool

    - name: Deploy Traefik .env (Cloudflare token)
      ansible.builtin.template:
        src: templates/traefik.env.j2
        dest: "{{ traefik_install_path }}/.env"
        mode: "0600"
        force: true

    - name: Deploy Traefik compose file
      ansible.builtin.template:
        src: templates/traefik-compose.yml.j2
        dest: "{{ traefik_install_path }}/docker-compose.yml"
        mode: "0644"
      register: traefik_compose_deployed

    - name: Start Traefik stack
      ansible.builtin.shell: |
        cd {{ traefik_install_path }} && docker compose up -d
      register: traefik_up
      changed_when: "'Creating' in traefik_up.stderr or 'Starting' in traefik_up.stderr or 'Recreating' in traefik_up.stderr"
      args:
        executable: /bin/bash

    - name: Force-recreate Traefik when compose config changed
      ansible.builtin.shell: |
        cd {{ traefik_install_path }} && docker compose up -d --force-recreate traefik
      register: traefik_recreate
      changed_when: true
      args:
        executable: /bin/bash
      when: traefik_compose_deployed.changed

    - name: Create static web directory
      ansible.builtin.file:
        path: "{{ static_web_install_path }}"
        state: directory
        mode: "0755"

    - name: Create /var/www/html for static content
      ansible.builtin.file:
        path: /var/www/html
        state: directory
        mode: "0755"

    - name: Set default static web vhosts when not defined
      ansible.builtin.set_fact:
        static_web_vhosts: "{{ [{ fqdn: (static_web_fqdn | default('www.' + domain)), doc_root: (static_web_default_doc_root | default(domain)) }] }}"
      when: static_web_vhosts is not defined or static_web_vhosts | length == 0

    - name: Get unique static web document roots
      ansible.builtin.set_fact:
        static_web_doc_roots: "{{ static_web_vhosts | map(attribute='doc_root') | unique | list }}"

    - name: Create static web doc root directories
      ansible.builtin.file:
        path: "/var/www/html/{{ item }}/public"
        state: directory
        mode: "0755"
      loop: "{{ static_web_doc_roots }}"

    - name: Deploy static web nginx config
      ansible.builtin.template:
        src: templates/static-web-nginx.conf.j2
        dest: "{{ static_web_install_path }}/nginx.conf"
        mode: "0644"

    - name: Deploy static web compose
      ansible.builtin.template:
        src: templates/static-web-compose.yml.j2
        dest: "{{ static_web_install_path }}/docker-compose.yml"
        mode: "0644"

    - name: Start static web stack
      ansible.builtin.shell: |
        cd {{ static_web_install_path }} && docker compose up -d
      register: static_web_up
      changed_when: "'Creating' in static_web_up.stdout or 'Starting' in static_web_up.stdout"
      args:
        executable: /bin/bash
