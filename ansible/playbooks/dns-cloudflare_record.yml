---
# Ensure a single Cloudflare DNS record exists and matches desired state.
# Expects:
# - cf_api_base, cf_zone_id, cloudflare_api_token
# - rec: {type,name,content,ttl,proxied}

- name: Lookup existing DNS record {{ rec.type }} {{ rec.name }}
  ansible.builtin.uri:
    url: "{{ cf_api_base }}/zones/{{ cf_zone_id }}/dns_records?type={{ rec.type }}&name={{ rec.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    return_content: true
  register: cf_lookup

- name: Fail if multiple matching records exist for {{ rec.type }} {{ rec.name }}
  ansible.builtin.fail:
    msg: "Multiple DNS records exist for {{ rec.type }} {{ rec.name }}; please deduplicate in Cloudflare before running automation."
  when: cf_lookup.json.result | length > 1

- name: Set existing record fact (if any)
  ansible.builtin.set_fact:
    cf_existing: "{{ (cf_lookup.json.result | first) if (cf_lookup.json.result | length > 0) else None }}"

- name: Create DNS record {{ rec.type }} {{ rec.name }} if missing
  ansible.builtin.uri:
    url: "{{ cf_api_base }}/zones/{{ cf_zone_id }}/dns_records"
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      type: "{{ rec.type }}"
      name: "{{ rec.name }}"
      content: "{{ rec.content }}"
      ttl: "{{ rec.ttl | default(1) }}"
      proxied: "{{ rec.proxied | default(false) }}"
    return_content: true
    status_code: [200, 201]
  when: cf_existing is none

- name: Update DNS record {{ rec.type }} {{ rec.name }} if drifted
  ansible.builtin.uri:
    url: "{{ cf_api_base }}/zones/{{ cf_zone_id }}/dns_records/{{ cf_existing.id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      type: "{{ rec.type }}"
      name: "{{ rec.name }}"
      content: "{{ rec.content }}"
      ttl: "{{ rec.ttl | default(1) }}"
      proxied: "{{ rec.proxied | default(false) }}"
    return_content: true
    status_code: [200]
  when:
    - cf_existing is not none
    - cloudflare_allow_updates | default(false) | bool
    - (cf_existing.content | string) != (rec.content | string)
      or (cf_existing.ttl | int) != (rec.ttl | default(1) | int)
      or ((cf_existing.proxied | default(false) | bool) != (rec.proxied | default(false) | bool))

- name: Fail if drift detected but updates are disabled (safety guard)
  ansible.builtin.fail:
    msg: >-
      DNS drift detected for {{ rec.type }} {{ rec.name }} but updates are disabled.
      Refusing to overwrite existing Cloudflare record in a shared production zone.
      If this is intentional, re-run with -e cloudflare_allow_updates=true (and ensure you also set
      dns_core_apply_ready=true in dns-cloudflare.yml).
  when:
    - cf_existing is not none
    - not (cloudflare_allow_updates | default(false) | bool)
    - (cf_existing.content | string) != (rec.content | string)
      or (cf_existing.ttl | int) != (rec.ttl | default(1) | int)
      or ((cf_existing.proxied | default(false) | bool) != (rec.proxied | default(false) | bool))

