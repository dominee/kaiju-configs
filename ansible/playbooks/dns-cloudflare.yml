---
# Manage Cloudflare DNS records for core host/service FQDNs (hell.sk zone).
# Run: ansible-playbook -i ../inventory/hosts.yml playbooks/dns-cloudflare.yml
#
# Requirements:
# - group_vars/all.yml:
#   - domain: hell.sk
#   - cloudflare_dns_api_token: <scoped API Token> (or legacy cloudflare_api_token)
#   - web_ip, mail_ip
#   - (optional) dozzle_fqdn, grafana_fqdn, static_web_vhosts
#
# Notes:
# - This playbook manages only records within the Cloudflare zone matching `domain`.
# - Mail hostnames that must support SMTP/IMAPS are created as DNS-only (proxied: false).
#
# *** PRODUCTION SAFETY GUARD ***
# This playbook can overwrite existing A records (via PUT) for names like:
# - mail.<domain>, autodiscover.<domain>, autoconfig.<domain>, webmail.<domain>
# If those names currently point at other production hosts, running this during lab WILL cause outages.
#
# The flag `dns_core_apply_ready: true` MUST be explicitly set (via -e or group_vars) to allow any writes.
# Without it the playbook hard-fails before making Cloudflare API changes.

- name: Manage Cloudflare DNS (core hostnames)
  hosts: localhost
  gather_facts: false

  vars:
    cf_api_base: "https://api.cloudflare.com/client/v4"
    cf_zone_name: "{{ cloudflare_zone_name | default(domain) }}"

    # Optional: webmail is HTTP; can be proxied. Set cf_webmail_proxied in group_vars. _effective avoids recursive play-var templating.
    cf_webmail_proxied_effective: "{{ cf_webmail_proxied | default(false) | bool }}"
    cf_web_a_proxied_effective: "{{ cf_web_a_proxied | default(true) | bool }}"

  tasks:
    - name: Enforce core DNS safety guard
      ansible.builtin.fail:
        msg: |
          SAFETY GUARD: dns-cloudflare.yml will NOT write A records unless dns_core_apply_ready=true
          is explicitly passed. This prevents accidental overwrites in a shared production zone.

          When you intentionally want to apply these A record changes, re-run with:
            -e dns_core_apply_ready=true
      when: not (dns_core_apply_ready | default(false) | bool)

    - name: Fail if no Cloudflare DNS API token is configured
      ansible.builtin.fail:
        msg: >-
          Set cloudflare_dns_api_token (scoped API Token with Zone.DNS Edit) in group_vars/all.yml,
          or cloudflare_api_token for legacy use.
      when: >
        (cloudflare_dns_api_token | default('') | trim | length == 0)
        and (cloudflare_api_token | default('') | trim | length == 0)

    - name: Prepare Cloudflare DNS API token (Bearer)
      ansible.builtin.import_tasks: tasks/cloudflare-api-token.yml

    - name: Get Cloudflare zone id for {{ cf_zone_name }}
      ansible.builtin.uri:
        url: "{{ cf_api_base }}/zones?name={{ cf_zone_name }}"
        method: GET
        headers: "{{ cf_cloudflare_request_headers }}"
        return_content: true
      register: cf_zone_resp

    - name: Set Cloudflare zone id
      ansible.builtin.set_fact:
        cf_zone_id: "{{ (cf_zone_resp.json.result | first).id }}"
      failed_when: cf_zone_resp.json.result | length != 1

    # Avoid regex_replace + from_json (backrefs in Jinja often produce invalid JSON).
    - name: Build static web A records for Cloudflare (FQDNs under primary domain only)
      ansible.builtin.set_fact:
        cf_static_web_a_records: "{{ cf_static_web_a_records | default([]) + [{'type': 'A', 'name': item, 'content': web_ip, 'ttl': 1, 'proxied': cf_web_a_proxied_effective}] }}"
      loop: >-
        {{
          (static_web_vhosts | default([]))
          | map(attribute='fqdn')
          | select('match', '(^|\\.)' + (domain | regex_escape) + '$')
          | list
          | unique
        }}
      loop_control:
        label: "{{ item }}"
      when:
        - web_ip is defined
        - mail_ip is defined

    - name: Build desired core A records (hell.sk only)
      ansible.builtin.set_fact:
        cf_desired_records: "{{ cf_desired_core_a_records + (cf_static_web_a_records | default([])) }}"
      vars:
        cf_desired_core_a_records: >-
          {{
            [
              {'type': 'A', 'name': kaiju_fqdn | default('kaiju.' + domain), 'content': web_ip, 'ttl': 1, 'proxied': cf_web_a_proxied_effective},
              {'type': 'A', 'name': mailcow_fqdn | default('mail.' + domain), 'content': mail_ip, 'ttl': 1, 'proxied': false},
              {'type': 'A', 'name': 'autodiscover.' + domain, 'content': mail_ip, 'ttl': 1, 'proxied': false},
              {'type': 'A', 'name': 'autoconfig.' + domain, 'content': mail_ip, 'ttl': 1, 'proxied': false},
              {'type': 'A', 'name': mailcow_webmail_fqdn | default('webmail.' + domain), 'content': mail_ip, 'ttl': 1, 'proxied': cf_webmail_proxied_effective},
              {'type': 'A', 'name': grafana_fqdn | default('metrics.' + domain), 'content': web_ip, 'ttl': 1, 'proxied': cf_web_a_proxied_effective},
              {'type': 'A', 'name': dozzle_fqdn | default('logs.' + domain), 'content': web_ip, 'ttl': 1, 'proxied': cf_web_a_proxied_effective},
            ]
          }}
      when:
        - web_ip is defined
        - mail_ip is defined

    - name: Fail if web_ip or mail_ip not defined
      ansible.builtin.fail:
        msg: "web_ip and mail_ip must be set in group_vars/all.yml"
      when: web_ip is not defined or mail_ip is not defined

    - name: Ensure desired records exist (create/update)
      ansible.builtin.include_tasks: dns-cloudflare_record.yml
      loop: "{{ cf_desired_records }}"
      loop_control:
        loop_var: rec

