---
# Deploy mailcow behind Traefik on kaiju.
# Run after docker.yml (Docker + Traefik must be running). Requires group_vars: domain, mailcow_fqdn, etc.
# Run: ansible-playbook -i ../inventory/hosts.yml mailcow.yml
- name: Deploy mailcow with Traefik integration
  hosts: kaiju
  become: true
  vars:
    mailcow_repo: https://github.com/mailcow/mailcow-dockerized.git
    mailcow_branch: master
    mailcow_git_update_effective: "{{ mailcow_git_update | default(true) | bool }}"
  tasks:
    - name: Ensure /vault exists (LUKS data mount)
      ansible.builtin.file:
        path: /vault
        state: directory
        mode: "0755"
      failed_when: false

    - name: Install git
      ansible.builtin.apt:
        name: git
        state: present
        update_cache: true

    - name: Detect existing mailcow git checkout
      ansible.builtin.stat:
        path: "{{ mailcow_install_path }}/.git"
      register: mailcow_gitdir_stat

    - name: Check for local modifications in mailcow checkout (if present)
      ansible.builtin.command:
        argv:
          - git
          - -C
          - "{{ mailcow_install_path }}"
          - status
          - --porcelain
      register: mailcow_git_status
      changed_when: false
      failed_when: false
      when: mailcow_gitdir_stat.stat.exists

    - name: Decide whether to update mailcow checkout
      ansible.builtin.set_fact:
        mailcow_git_update_ok: >-
          {{
            (mailcow_git_update_effective | bool)
            and (not (mailcow_git_status.stdout | default('') | length > 0))
          }}

    - name: Warn when mailcow checkout is dirty (skipping git update)
      ansible.builtin.debug:
        msg:
          - "mailcow checkout at {{ mailcow_install_path }} has local modifications; skipping git update to avoid overwriting changes."
          - "If you want Ansible to forcibly reset to upstream, clean/stash changes, or run with: -e mailcow_git_update=false"
      when:
        - mailcow_gitdir_stat.stat.exists
        - (mailcow_git_status.stdout | default('') | length > 0)
        - mailcow_git_update_effective | bool

    - name: Clone or update mailcow-dockerized
      ansible.builtin.git:
        repo: "{{ mailcow_repo }}"
        dest: "{{ mailcow_install_path }}"
        version: "{{ mailcow_branch }}"
        force: false
        update: "{{ mailcow_git_update_ok | default(mailcow_git_update_effective) | bool }}"
      register: mailcow_git

    - name: Check if mailcow.conf already exists
      ansible.builtin.stat:
        path: "{{ mailcow_install_path }}/mailcow.conf"
      register: mailcow_conf_stat

    - name: Generate random mailcow DB/Redis passwords
      ansible.builtin.set_fact:
        mailcow_dbpass: "{{ lookup('password', '/dev/null length=28 chars=ascii_letters,digits') }}"
        mailcow_dbroot: "{{ lookup('password', '/dev/null length=28 chars=ascii_letters,digits') }}"
        mailcow_redispass: "{{ lookup('password', '/dev/null length=28 chars=ascii_letters,digits') }}"
        mailcow_sogo_key: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
      when: not mailcow_conf_stat.stat.exists

    - name: Deploy mailcow.conf (only on first install; set mailcow_dbpass etc. in group_vars to preserve secrets)
      ansible.builtin.template:
        src: templates/mailcow.conf.j2
        dest: "{{ mailcow_install_path }}/mailcow.conf"
        mode: "0600"
      when: not mailcow_conf_stat.stat.exists

    # Existing installs keep their own mailcow.conf (secrets). We only enforce the reverse-proxy
    # port/bind settings so mailcow-nginx does not try to bind 0.0.0.0:80/443 (Traefik owns them).
    - name: Enforce reverse-proxy port/bind settings in existing mailcow.conf
      ansible.builtin.lineinfile:
        path: "{{ mailcow_install_path }}/mailcow.conf"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        create: false
        backrefs: false
      loop:
        # Reverse proxy mode: publish mailcow nginx only on localhost high ports (Traefik owns 80/443).
        - { key: "HTTP_BIND", value: "{{ mailcow_http_bind | default('127.0.0.1') }}" }
        - { key: "HTTP_PORT", value: "{{ mailcow_http_port | default('18080') }}" }
        - { key: "HTTPS_BIND", value: "{{ mailcow_https_bind | default('127.0.0.1') }}" }
        - { key: "HTTPS_PORT", value: "{{ mailcow_https_port | default('18443') }}" }
        - { key: "HTTP_REDIRECT", value: "n" }
        - { key: "SKIP_LETS_ENCRYPT", value: "y" }
      when: mailcow_conf_stat.stat.exists

    - name: Persist a backup copy of mailcow.conf on first install (secrets)
      ansible.builtin.copy:
        src: "{{ mailcow_install_path }}/mailcow.conf"
        dest: "/root/mailcow.conf.initial"
        remote_src: true
        owner: root
        group: root
        mode: "0600"
        force: false
      when: not mailcow_conf_stat.stat.exists

    - name: Warn to vault mailcow.conf secrets after first install
      ansible.builtin.debug:
        msg:
          - "Mailcow secrets were generated and written to {{ mailcow_install_path }}/mailcow.conf."
          - "A one-time backup copy was saved to /root/mailcow.conf.initial (0600)."
          - "Best practice: store these secrets in ansible-vault (group_vars/all.yml) or an external secret manager."
      when: not mailcow_conf_stat.stat.exists

    - name: Create .env symlink to mailcow.conf
      ansible.builtin.file:
        src: mailcow.conf
        path: "{{ mailcow_install_path }}/.env"
        state: link
        force: true

    - name: Ensure mailcow data/assets/ssl exists
      ansible.builtin.file:
        path: "{{ mailcow_install_path }}/data/assets/ssl"
        state: directory
        mode: "0755"

    - name: Check if snake-oil cert exists
      ansible.builtin.stat:
        path: "{{ mailcow_install_path }}/data/assets/ssl/cert.pem"
      register: mailcow_cert_stat

    - name: Generate snake-oil certificate for mailcow
      ansible.builtin.shell: |
        openssl req -x509 -newkey rsa:4096 -keyout "{{ mailcow_install_path }}/data/assets/ssl/key.pem" \
          -out "{{ mailcow_install_path }}/data/assets/ssl/cert.pem" -days 365 \
          -subj "/CN={{ mailcow_fqdn }}" -sha256 -nodes
      when: not mailcow_cert_stat.stat.exists
      args:
        executable: /bin/bash
      changed_when: true

    # Dovecot in dovecot-mailcow expects ssl_dh at /etc/ssl/mail/dhparams.pem (host: data/assets/ssl/dhparams.pem).
    # If missing, supervisord restarts Dovecot in a tight loop (exit 89).
    - name: Generate mailcow dhparams.pem for Dovecot (idempotent; first run can take a few minutes)
      ansible.builtin.command:
        argv:
          - openssl
          - dhparam
          - -out
          - "{{ mailcow_install_path }}/data/assets/ssl/dhparams.pem"
          - "{{ mailcow_dhparam_bits | default(2048) | string }}"
        creates: "{{ mailcow_install_path }}/data/assets/ssl/dhparams.pem"
      register: mailcow_dhparam_gen

    - name: Stat mailcow dhparams.pem (after generate or existing file)
      ansible.builtin.stat:
        path: "{{ mailcow_install_path }}/data/assets/ssl/dhparams.pem"
      register: mailcow_dhparams_stat

    - name: Ensure dhparams.pem permissions
      ansible.builtin.file:
        path: "{{ mailcow_install_path }}/data/assets/ssl/dhparams.pem"
        state: file
        owner: root
        group: root
        mode: "0644"
      when: mailcow_dhparams_stat.stat.exists

    - name: Restart dovecot-mailcow after creating dhparams.pem
      ansible.builtin.shell: |
        cd {{ mailcow_install_path }} && docker compose -f docker-compose.yml -f docker-compose.override.yml restart dovecot-mailcow
      when: mailcow_dhparam_gen.changed | default(false)
      args:
        executable: /bin/bash
      register: mailcow_dovecot_restart
      changed_when: mailcow_dovecot_restart.rc == 0

    - name: Ensure Docker network proxy exists (for Traefik <-> mailcow)
      ansible.builtin.shell: docker network create proxy 2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: Deploy mailcow Traefik override
      ansible.builtin.template:
        src: templates/mailcow-traefik-override.yml.j2
        dest: "{{ mailcow_install_path }}/docker-compose.override.yml"
        mode: "0644"

    - name: Start mailcow stack (with Docker NAT-chain recovery)
      block:
        - name: Start mailcow stack
          ansible.builtin.shell: |
            cd {{ mailcow_install_path }} && docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
          register: mailcow_up
          changed_when: "'Creating' in mailcow_up.stderr or 'Starting' in mailcow_up.stderr or 'Pulling' in mailcow_up.stderr"
          args:
            executable: /bin/bash
      rescue:
        - name: Restart Docker to recreate iptables/nft NAT chains
          ansible.builtin.service:
            name: docker
            state: restarted

        - name: Wait for Docker engine socket
          ansible.builtin.wait_for:
            path: /var/run/docker.sock
            state: present
            timeout: 60

        - name: Retry start mailcow stack after Docker restart
          ansible.builtin.shell: |
            cd {{ mailcow_install_path }} && docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
          register: mailcow_up_retry
          changed_when: "'Creating' in mailcow_up_retry.stderr or 'Starting' in mailcow_up_retry.stderr or 'Pulling' in mailcow_up_retry.stderr"
          args:
            executable: /bin/bash

    - name: Check current applied mailcow admin password hash marker
      ansible.builtin.stat:
        path: "{{ mailcow_install_path }}/.ansible_admin_pass.sha256"
      register: mailcow_admin_hash_marker_stat
      no_log: true

    - name: Read current applied mailcow admin password hash marker (if present)
      ansible.builtin.slurp:
        path: "{{ mailcow_install_path }}/.ansible_admin_pass.sha256"
      register: mailcow_admin_hash_marker_slurp
      when: mailcow_admin_hash_marker_stat.stat.exists
      no_log: true

    - name: Compute desired mailcow admin password hash
      ansible.builtin.set_fact:
        mailcow_admin_pass_sha256: "{{ (mailcow_admin_pass | string) | hash('sha256') }}"
        mailcow_admin_hash_marker_current: >-
          {{
            (mailcow_admin_hash_marker_slurp.content | b64decode | trim)
            if (mailcow_admin_hash_marker_stat.stat.exists | default(false))
            else ''
          }}
      when: mailcow_admin_pass is defined
      no_log: true

    - name: Set mailcow admin password from Ansible (idempotent)
      block:
        - name: Assert mailcow_admin_user is supported
          ansible.builtin.assert:
            that:
              - (mailcow_admin_user | default('admin')) == 'admin'
            fail_msg: "This playbook currently supports only resetting the built-in Mailcow admin user 'admin'."

        - name: Wait for mysql-mailcow and dovecot-mailcow to be running
          ansible.builtin.command:
            argv:
              - docker
              - inspect
              - -f
              - "{{'{{'}}.State.Running{{'}}'}}"
              - "{{ item }}"
          loop:
            - mailcow-mysql-mailcow-1
            - mailcow-dovecot-mailcow-1
          register: mailcow_core_running
          changed_when: false
          failed_when: false
          retries: 30
          delay: 2
          until: mailcow_core_running.stdout | trim == 'true'

        - name: Install Mailcow admin reset helper (sources mailcow.conf)
          ansible.builtin.copy:
            dest: "{{ mailcow_install_path }}/.ansible-set-mailcow-admin-pass.sh"
            owner: root
            group: root
            mode: "0700"
            content: |
              #!/usr/bin/env bash
              set -euo pipefail
              cd "{{ mailcow_install_path }}"
              # Prefer explicit env vars (Ansible/vault). Fall back to mailcow.conf (existing installs).
              if [[ -z "${DBUSER:-}" || -z "${DBPASS:-}" || -z "${DBNAME:-}" ]]; then
                # shellcheck disable=SC1091
                source ./mailcow.conf
              fi
              if [[ -z "${DBUSER:-}" || -z "${DBPASS:-}" || -z "${DBNAME:-}" ]]; then
                echo "Missing DBUSER/DBPASS/DBNAME in mailcow.conf" >&2
                exit 2
              fi
              if [[ -z "${ADMIN_PASS:-}" ]]; then
                echo "Missing ADMIN_PASS env" >&2
                exit 2
              fi
              # Hash the desired password using dovecot's supported scheme.
              ADMIN_PASS_HASH="$(
                docker compose -f docker-compose.yml -f docker-compose.override.yml exec -T \
                  -e "ADMIN_PASS=${ADMIN_PASS}" \
                  dovecot-mailcow sh -lc 'doveadm pw -s SSHA256 -p "$ADMIN_PASS"' \
                  | tr -d '\r\n'
              )"
              if [[ -z "${ADMIN_PASS_HASH:-}" ]]; then
                echo "Failed to compute password hash" >&2
                exit 3
              fi
              # Apply reset (mirrors mailcow helper semantics, but uses the provided password).
              # NOTE: pass DB password via env, not CLI args (avoids leaking into Ansible output/process list).
              docker compose -f docker-compose.yml -f docker-compose.override.yml exec -T \
                -e "DBUSER=${DBUSER}" \
                -e "DBNAME=${DBNAME}" \
                -e "ADMIN_PASS_HASH=${ADMIN_PASS_HASH}" \
                -e "MYSQL_PWD=${DBPASS}" \
                mysql-mailcow sh -lc 'mysql -u"$DBUSER" "$DBNAME" -e "DELETE FROM admin WHERE username='\''admin'\'';
                  DELETE FROM domain_admins WHERE username='\''admin'\'';
                  INSERT INTO admin (username, password, superadmin, active) VALUES ('\''admin'\'', '\''$ADMIN_PASS_HASH'\'', 1, 1);
                  DELETE FROM tfa WHERE username='\''admin'\'';"'
          no_log: true

        - name: Reset Mailcow admin password via helper (idempotent marker controlled)
          ansible.builtin.command:
            argv:
              - /bin/bash
              - "{{ mailcow_install_path }}/.ansible-set-mailcow-admin-pass.sh"
          environment:
            ADMIN_PASS: "{{ mailcow_admin_pass }}"
            DBUSER: "{{ mailcow_dbuser | default('mailcow') }}"
            DBNAME: "{{ mailcow_dbname | default('mailcow') }}"
            DBPASS: "{{ mailcow_dbpass | default('') }}"
          register: mailcow_set_admin_pass_helper
          changed_when: true
          retries: 30
          delay: 3
          until: mailcow_set_admin_pass_helper.rc == 0
          # The helper avoids passing secrets on the command line; safe to show stderr if it fails.
          no_log: false
      rescue:
        - name: Show mailcow compose status (safe)
          ansible.builtin.command:
            argv:
              - docker
              - compose
              - -f
              - docker-compose.yml
              - -f
              - docker-compose.override.yml
              - ps
          args:
            chdir: "{{ mailcow_install_path }}"
          register: mailcow_compose_ps_safe
          changed_when: false
          failed_when: false

        - name: Show php-fpm-mailcow logs (safe, last 120 lines)
          ansible.builtin.command:
            argv:
              - docker
              - compose
              - -f
              - docker-compose.yml
              - -f
              - docker-compose.override.yml
              - logs
              - --tail
              - "120"
              - php-fpm-mailcow
          args:
            chdir: "{{ mailcow_install_path }}"
          register: mailcow_php_fpm_logs_safe
          changed_when: false
          failed_when: false

        - name: Show mysql-mailcow logs (safe, last 200 lines)
          ansible.builtin.command:
            argv:
              - docker
              - compose
              - -f
              - docker-compose.yml
              - -f
              - docker-compose.override.yml
              - logs
              - --tail
              - "200"
              - mysql-mailcow
          args:
            chdir: "{{ mailcow_install_path }}"
          register: mailcow_mysql_logs_safe
          changed_when: false
          failed_when: false

        - name: Fail with guidance (admin password set did not succeed yet)
          ansible.builtin.fail:
            msg:
              - "Failed to set Mailcow admin password via host-side helper script."
              - "This usually means the stack is not fully initialised yet, or the DB is not reachable from inside the mysql-mailcow container."
              - "Re-run the playbook in a minute, or inspect the outputs below."
              - "== docker compose ps =="
              - "{{ mailcow_compose_ps_safe.stdout | default('') }}"
              - "== php-fpm-mailcow logs (tail) =="
              - "{{ mailcow_php_fpm_logs_safe.stdout | default('') }}"
              - "== mysql-mailcow logs (tail) =="
              - "{{ mailcow_mysql_logs_safe.stdout | default('') }}"
      when:
        - mailcow_admin_pass is defined
        - (mailcow_admin_pass | string | length) > 0
        - mailcow_admin_hash_marker_current != mailcow_admin_pass_sha256

    - name: Persist applied mailcow admin password hash marker
      ansible.builtin.copy:
        dest: "{{ mailcow_install_path }}/.ansible_admin_pass.sha256"
        content: "{{ mailcow_admin_pass_sha256 }}\n"
        owner: root
        group: root
        mode: "0600"
      when:
        - mailcow_admin_pass is defined
        - (mailcow_admin_pass | string | length) > 0
        - mailcow_admin_hash_marker_current != mailcow_admin_pass_sha256
      no_log: true

    - name: Probe mailcow nginx from Traefik (diagnose 502/connection issues)
      ansible.builtin.shell: |
        set -euo pipefail
        for p in 18080 18443 8080 80 8443 443; do
          echo "== Probing mailcow-nginx-mailcow-1:${p} from traefik =="
          docker exec traefik sh -lc "wget -qSO- --timeout=3 --tries=1 http://mailcow-nginx-mailcow-1:${p}/ 2>&1 | head -n 5" || true
        done
        echo "== Probing localhost from inside mailcow-nginx-mailcow-1 =="
        for p in 18080 18443 8080 80 8443 443; do
          echo "--- 127.0.0.1:${p} ---"
          docker exec mailcow-nginx-mailcow-1 sh -lc "wget -qSO- --timeout=3 --tries=1 http://127.0.0.1:${p}/ 2>&1 | head -n 5" || true
        done
      register: mailcow_traefik_probe
      changed_when: false
      failed_when: false
      args:
        executable: /bin/bash

    - name: Show Traefik->Mailcow probe output
      ansible.builtin.debug:
        var: mailcow_traefik_probe.stdout_lines

    - name: Collect mailcow nginx container state (for 502 diagnosis)
      ansible.builtin.command:
        argv:
          - docker
          - ps
          - -a
          - --filter
          - name=mailcow-nginx
          - --format
          - "{% raw %}table {{.Names}}\t{{.Status}}\t{{.Ports}}{% endraw %}"
      register: mailcow_nginx_ps
      changed_when: false
      failed_when: false

    - name: Collect mailcow nginx container runtime state (for 502 diagnosis)
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - mailcow-nginx-mailcow-1
          - --format
          - "{% raw %}{{json .State}}{% endraw %}"
      register: mailcow_nginx_inspect_state
      changed_when: false
      failed_when: false

    - name: Collect mailcow nginx published ports (for 502 diagnosis)
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - mailcow-nginx-mailcow-1
          - --format
          - "{% raw %}{{json .NetworkSettings.Ports}}{% endraw %}"
      register: mailcow_nginx_inspect_ports
      changed_when: false
      failed_when: false

    - name: Show mailcow nginx container state
      ansible.builtin.debug:
        msg:
          - "== docker ps (mailcow nginx) =="
          - "{{ mailcow_nginx_ps.stdout }}"
          - "== docker inspect (mailcow-nginx-mailcow-1) State =="
          - "{{ mailcow_nginx_inspect_state.stdout }}"
          - "== docker inspect (mailcow-nginx-mailcow-1) NetworkSettings.Ports =="
          - "{{ mailcow_nginx_inspect_ports.stdout }}"

    - name: Collect mailcow nginx container logs (last 120 lines)
      ansible.builtin.shell: |
        set -euo pipefail
        docker logs --tail 120 mailcow-nginx-mailcow-1 2>&1 || true
      register: mailcow_nginx_logs
      changed_when: false
      failed_when: false
      args:
        executable: /bin/bash

    - name: Show mailcow nginx logs
      ansible.builtin.debug:
        var: mailcow_nginx_logs.stdout_lines
